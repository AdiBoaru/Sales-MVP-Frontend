name: Deploy shop to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel overlapping deploys.
concurrency:
  group: deploy-shop
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CHAT_API_BASE: ${{ secrets.VITE_CHAT_API_BASE }}
          VITE_CHAT_PUBLIC_TOKEN: ${{ secrets.VITE_CHAT_PUBLIC_TOKEN }}

      - name: Upload build artifact (manual fallback)
        uses: actions/upload-artifact@v4
        with:
          name: shop-dist
          path: ./dist/
          retention-days: 5

      # Hostinger's FTPS endpoint frequently times out on the FIRST connection
      # ("Error: Timeout (control socket)"). The build is fine — it just needs a retry.
      # We attempt up to 3 times; only the final attempt can fail the job.
      # NOTE: ⚠️ public_html is NOT at the FTP root on this Hostinger account — it's under
      # domains/. The sync is INCREMENTAL (orphaned files are not deleted).
      - name: Deploy via FTPS (attempt 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 120000
          local-dir: ./dist/
          server-dir: ./domains/nativextech.com/public_html/shop/

      - name: Wait before retry
        if: steps.ftp1.outcome == 'failure'
        run: sleep 15

      - name: Deploy via FTPS (attempt 2)
        id: ftp2
        if: steps.ftp1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 120000
          local-dir: ./dist/
          server-dir: ./domains/nativextech.com/public_html/shop/

      - name: Wait before final retry
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        run: sleep 30

      - name: Deploy via FTPS (attempt 3)
        if: steps.ftp1.outcome == 'failure' && steps.ftp2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 120000
          local-dir: ./dist/
          server-dir: ./domains/nativextech.com/public_html/shop/
